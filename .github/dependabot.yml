version: 2
updates:
  # Dependabot configuration for .NET solutions

  # Monitor NuGet packages for Part 2 - Project Creation
  - package-ecosystem: "nuget"
    directory: "/Part 2 - Project Creation/GenAiLab/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      part-2-nuget:
        patterns:
          - "*"

  # Monitor NuGet packages for Part 6 - Deployment
  - package-ecosystem: "nuget"
    directory: "/Part 6 - Deployment/GenAiLab/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      part-6-nuget:
        patterns:
          - "*"

  # Monitor NuGet packages for Part 7 - MCP Server Basics
  - package-ecosystem: "nuget"
    directory: "/Part 7 - MCP Server Basics/WeatherMcpServer/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      part-7-nuget:
        patterns:
          - "*"

  # Monitor NuGet packages for Part 8 - Enhanced MCP Server
  - package-ecosystem: "nuget"
    directory: "/Part 8 - Enhanced MCP Server/ContosoOrdersMcpServer/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      part-8-nuget:
        patterns:
          - "*"
