version: 2
updates:
  # Dependabot configuration for workshop-wide NuGet package updates
  - package-ecosystem: "nuget"
    directories:
      - "/Part 2 - Project Creation/GenAiLab/"
      - "/Part 6 - Deployment/GenAiLab/"
      - "/Part 7 - MCP Server Basics/MyMcpServer/"
      - "/Part 8 - Enhanced MCP Server/ContosoOrdersMcpServer/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      nuget-all:
        patterns:
          - "*"
    open-pull-requests-limit: 10
